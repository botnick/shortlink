name: Bump version

# Auto-increments the patch version in package.json on each push to main,
# committing the change back as `chore: bump version … [skip ci]` so it does
# not re-trigger itself.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: bump version') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git commit -am "chore: bump version to ${VERSION} [skip ci]"
          git push
