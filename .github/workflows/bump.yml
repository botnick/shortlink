name: Bump version

# Auto-increments the patch version in package.json on every push to main,
# then commits the change back with [skip ci] so it doesn't re-trigger itself.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: bump-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    # Skip the bot's own commits, and skip the very first push (branch creation),
    # so a freshly initialised repo stays at a single commit.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore: bump version') && github.event.before != '0000000000000000000000000000000000000000' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json package-lock.json
          git commit -m "chore: bump version to $VERSION [skip ci]"
          git push
